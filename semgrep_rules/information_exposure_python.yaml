rules:
- id: detect-information_exposure-python
  languages:
    - python
  severity: medium
  matchers:
    - type: regex
      pattern: |
        (?s)(?<=\bfrom\s+django\.core\.cache\s+import\s+).*?(?=Cache|cache_page)
        |(?<=\bfrom\s+django\.db\.models\s+import\s+).*?(?=Model)
        |(?<=[\s\S]*settings\.SECRET_KEY)[\s\S]*=(.*?)
  messages:
    - "Potential information exposure: Ensure that sensitive information is not exposed through settings or cached responses."
  metadata:
    cwe:
      - CWE-203