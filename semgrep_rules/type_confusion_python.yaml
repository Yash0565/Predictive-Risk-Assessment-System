rules:
  - id: detect-type_confusion-python
    languages: [python]
    message: Detect vulnerable pattern
    severity: ERROR
    pattern: |
      (\bfrom\s+|^crypto\.)(\w+\.)?aes(?!_key_wrap)\b.*$
      (\bfrom\s+|^ssl\.)(\w+\.)?pkcs12\b.*$
      (\bfrom\s+|^asn1\s*\.)(\w+)\.distinguished_name\b.*$
      (\bfrom\s+|^pycryptodome\s*\.)(\w+)\.crypto\.paddings\b.*$
    ignore_missing_patterns: true