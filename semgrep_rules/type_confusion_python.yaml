rules:
- id: detect-type_confusion_python
  languages:
  - python
  severity: Medium
  matchers:
    - type: pattern-file
      patterns:
      - |
        /cryptography/
  tags:
  - type-confusion
  - cwe-843
  description: Detects potential type confusion vulnerabilities in cryptography usage.
  examples:
  - file: test.py
    contents: |
      from cryptography.hazmat.primitives.asymmetric import padding

      def process_data(data):
          public_key = ...
          # Potential vulnerability if data is not properly validated
          result = public_key.encrypt(data, padding.OAEP(mgf=padding.MGF1(algorithm=hashes.SHA256()), algorithm=hashes.SHA256(), label=None))