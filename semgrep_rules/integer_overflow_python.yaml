rules:
- id: detect-integer_overflow_python
  languages:
  - python
  severity: medium
  matchers:
    - pattern-file: lib/python/*.py
      pattern: |
        (\w+\.)?add\(\s*(\w+)\s*,\s*(\w+)\s*\)
        | (\w+\.)?subtract\(\s*(\w+)\s*,\s*(\w+)\s*\)
        | (\w+\.)?multiply\(\s*(\w+)\s*,\s*(\w+)\s*\)
  description: Detect potential integer overflow vulnerability in pillow