rules:
  - id: demo-sqli-fstring-execute
    languages: [python]
    message: SQL injection via f-string passed to execute()
    severity: ERROR
    metadata:
      cwe: CWE-89
    patterns:
      - pattern: $CURSOR.execute($QUERY)
      - pattern-inside: |
          $QUERY = f"..."
          ...
      - metavariable-regex:
          metavariable: $QUERY
          regex: ".*f[\"'].*"
