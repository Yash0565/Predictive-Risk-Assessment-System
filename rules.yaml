rules:
  - id: sql-injection-concat-variable
    pattern: |
      $QUERY = $A + $B
      ...
      $CURSOR.execute($QUERY)
    message: >
      SQL Injection (CWE-89): SQL query built with string concatenation then passed to execute().
      Use parameterized queries: cursor.execute(sql, (value,))
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: "A03:2021 - Injection"

  - id: sql-injection-concat-inline
    pattern: $CURSOR.execute($A + $B)
    message: >
      SQL Injection (CWE-89): String concatenation directly inside execute().
      Use parameterized queries: cursor.execute(sql, (value,))
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: "A03:2021 - Injection"

  - id: sql-injection-fstring
    pattern: $CURSOR.execute(f"...")
    message: >
      SQL Injection (CWE-89): f-string inside execute() may interpolate user input.
      Use parameterized queries: cursor.execute(sql, (value,))
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: "A03:2021 - Injection"

  - id: sql-injection-percent-format
    pattern: $CURSOR.execute($Q % $ARGS)
    message: >
      SQL Injection (CWE-89): % formatting inside execute().
      Use parameterized queries: cursor.execute(sql, (value,))
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: "A03:2021 - Injection"

  - id: sql-injection-format-method
    pattern: $CURSOR.execute($Q.format(...))
    message: >
      SQL Injection (CWE-89): .format() inside execute().
      Use parameterized queries: cursor.execute(sql, (value,))
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: "A03:2021 - Injection"